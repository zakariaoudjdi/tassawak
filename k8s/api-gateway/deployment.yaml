apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: tassawak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: tassawak/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tassawak-config
                  key: PORT_GATEWAY
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tassawak-config
                  key: PRODUCT_SERVICE_URL
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: tassawak-config
                  key: FRONTEND_ORIGIN
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: tassawak-config
                  key: KAFKA_BROKER
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
