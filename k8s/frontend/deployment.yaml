apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tassawak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Build image with the API gateway NodePort URL baked in:
          # docker build --build-arg VITE_API_URL=http://<node-ip>:30001/api -t tassawak/frontend:latest ./frontend
          image: tassawak/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
