apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: tassawak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              valueFrom:
                configMapKeyRef:
                  name: tassawak-config
                  key: ZOOKEEPER_CLIENT_PORT
            - name: ZOOKEEPER_TICK_TIME
              valueFrom:
                configMapKeyRef:
                  name: tassawak-config
                  key: ZOOKEEPER_TICK_TIME
          readinessProbe:
            exec:
              command:
                ["bash", "-c", "echo srvr | nc localhost 2181 | grep Mode"]
            initialDelaySeconds: 10
            periodSeconds: 10
